services:
  - type: web
    name: tradingview-telegram-webhook
    runtime: python
    plan: free
    rootDir: telegram_meme_calls
    buildCommand: pip install -r requirements.txt
    startCommand: python tradingview_telegram_webhook.py
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: TRADINGVIEW_WEBHOOK_HOST
        value: 0.0.0.0
      - key: TRADINGVIEW_WEBHOOK_PATH
        value: /webhook/tradingview
      - key: TRADINGVIEW_WEBHOOK_SECRET
        generateValue: true
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
